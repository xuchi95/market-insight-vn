name: Build Desktop App

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install desktop build deps (isolated)
        shell: bash
        run: |
          mkdir -p .desktop-build
          cd .desktop-build
          npm init -y >/dev/null
          npm install --ignore-scripts electron@33 electron-builder@25
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: ./.desktop-build/node_modules/.bin/electron-builder --win --x64 --config electron-builder.yml --publish never
      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: ./.desktop-build/node_modules/.bin/electron-builder --mac --config electron-builder.yml --publish never
      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: ./.desktop-build/node_modules/.bin/electron-builder --linux --config electron-builder.yml --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: marketwatch-desktop-${{ matrix.os }}
          path: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.AppImage
            dist-electron/*.deb
          if-no-files-found: ignore
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.AppImage
            dist-electron/*.deb
