name: Build Desktop App

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Install desktop build deps
        shell: bash
        run: |
          mkdir -p .desktop-build
          cd .desktop-build
          printf '{"name":"marketwatch-desktop-build","version":"1.0.0","private":true}\n' > package.json
          npm install --no-audit --no-fund --ignore-scripts electron-builder@25
      - name: Prepare desktop icons
        shell: bash
        run: |
          mkdir -p build
          cp public/favicon.ico build/icon.ico
          cp public/icon-512.png build/icon.png
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            mkdir -p build/icon.iconset
            sips -z 16 16 public/icon-512.png --out build/icon.iconset/icon_16x16.png
            sips -z 32 32 public/icon-512.png --out build/icon.iconset/icon_16x16@2x.png
            sips -z 32 32 public/icon-512.png --out build/icon.iconset/icon_32x32.png
            sips -z 64 64 public/icon-512.png --out build/icon.iconset/icon_32x32@2x.png
            sips -z 128 128 public/icon-512.png --out build/icon.iconset/icon_128x128.png
            sips -z 256 256 public/icon-512.png --out build/icon.iconset/icon_128x128@2x.png
            sips -z 256 256 public/icon-512.png --out build/icon.iconset/icon_256x256.png
            sips -z 512 512 public/icon-512.png --out build/icon.iconset/icon_256x256@2x.png
            cp public/icon-512.png build/icon.iconset/icon_512x512.png
            cp public/icon-512.png build/icon.iconset/icon_512x512@2x.png
            iconutil -c icns build/icon.iconset -o build/icon.icns
          fi
      - name: Verify desktop files
        shell: bash
        run: |
          test -f electron-builder.yml
          test -f electron/main.cjs
          test -f package.json
          test -f build/icon.ico
          test -f build/icon.png
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            test -f build/icon.icns
          fi
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: .desktop-build/node_modules/.bin/electron-builder --win --x64 --config electron-builder.yml --projectDir . --publish never
      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: .desktop-build/node_modules/.bin/electron-builder --mac --config electron-builder.yml --projectDir . --publish never
      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: .desktop-build/node_modules/.bin/electron-builder --linux --config electron-builder.yml --projectDir . --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: marketwatch-desktop-${{ matrix.os }}
          path: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.AppImage
            dist-electron/*.deb
          if-no-files-found: ignore
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.AppImage
            dist-electron/*.deb
