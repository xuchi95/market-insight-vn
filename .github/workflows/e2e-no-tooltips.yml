name: E2E – No Tooltips

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  BUN_VERSION: "1.3.3"
  NODE_VERSION: "20.18.1"
  PLAYWRIGHT_VERSION: "1.60.0"
  # Pinned location for Playwright browser binaries (used for caching + isolation).
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers (pinned chromium build)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx --bun @playwright/test@${{ env.PLAYWRIGHT_VERSION }} install chromium

      - name: Install Playwright system deps
        run: bunx --bun @playwright/test@${{ env.PLAYWRIGHT_VERSION }} install-deps chromium

      - name: Verify pinned Playwright + browser versions
        run: |
          bunx --bun @playwright/test@${{ env.PLAYWRIGHT_VERSION }} --version
          ls "$PLAYWRIGHT_BROWSERS_PATH"

      - name: Run Playwright tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'placeholder' }}
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore